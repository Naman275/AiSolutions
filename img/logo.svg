<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#00D2FF"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#00D2FF;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:0.8"/>
    </linearGradient>
  </defs>

  <!-- Outer rotating ring -->
  <circle cx="25" cy="25" r="23" fill="none" stroke="url(#ringGrad)" stroke-width="1.5"
          stroke-dasharray="8 4 2 4" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate"
                      from="0 25 25" to="360 25 25" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- Middle pulsing ring -->
  <circle cx="25" cy="25" r="19" fill="none" stroke="url(#logoGrad)" stroke-width="1"
          stroke-dasharray="6 6" opacity="0.35">
    <animateTransform attributeName="transform" type="rotate"
                      from="360 25 25" to="0 25 25" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbiting dots -->
  <circle cx="25" cy="4" r="2" fill="#6C63FF" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate"
                      from="0 25 25" to="360 25 25" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="46" cy="25" r="1.5" fill="#00D2FF" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate"
                      from="120 25 25" to="480 25 25" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="25" cy="46" r="1.8" fill="#8B85FF" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate"
                      from="240 25 25" to="600 25 25" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Inner core circle - AI brain -->
  <circle cx="25" cy="25" r="14" fill="url(#logoGrad)" opacity="0.15">
    <animate attributeName="r" values="13;15;13" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Neural network nodes -->
  <!-- Center node -->
  <circle cx="25" cy="25" r="3.5" fill="url(#logoGrad)">
    <animate attributeName="r" values="3.5;4;3.5" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Surrounding nodes -->
  <circle cx="25" cy="15" r="2" fill="#6C63FF" opacity="0.9"/>
  <circle cx="33" cy="20" r="2" fill="#8B85FF" opacity="0.85"/>
  <circle cx="33" cy="30" r="2" fill="#00D2FF" opacity="0.9"/>
  <circle cx="25" cy="35" r="2" fill="#6C63FF" opacity="0.85"/>
  <circle cx="17" cy="30" r="2" fill="#8B85FF" opacity="0.9"/>
  <circle cx="17" cy="20" r="2" fill="#00D2FF" opacity="0.85"/>

  <!-- Neural connections with animated dash -->
  <g stroke="url(#logoGrad)" stroke-width="0.8" fill="none" opacity="0.5">
    <line x1="25" y1="15" x2="25" y2="25" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="33" y1="20" x2="25" y2="25" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="1.8s" repeatCount="indefinite"/>
    </line>
    <line x1="33" y1="30" x2="25" y2="25" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="25" y1="35" x2="25" y2="25" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="1.6s" repeatCount="indefinite"/>
    </line>
    <line x1="17" y1="30" x2="25" y2="25" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="1.9s" repeatCount="indefinite"/>
    </line>
    <line x1="17" y1="20" x2="25" y2="25" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="1.7s" repeatCount="indefinite"/>
    </line>
    <!-- Cross connections -->
    <line x1="25" y1="15" x2="33" y2="20" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="2.2s" repeatCount="indefinite"/>
    </line>
    <line x1="33" y1="20" x2="33" y2="30" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="2.4s" repeatCount="indefinite"/>
    </line>
    <line x1="33" y1="30" x2="25" y2="35" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="2.1s" repeatCount="indefinite"/>
    </line>
    <line x1="25" y1="35" x2="17" y2="30" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="2.3s" repeatCount="indefinite"/>
    </line>
    <line x1="17" y1="30" x2="17" y2="20" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="17" y1="20" x2="25" y2="15" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="2.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Tiny spark particles -->
  <circle cx="30" cy="10" r="0.8" fill="#00D2FF">
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="10;7;10" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="30" r="0.6" fill="#6C63FF">
    <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="cx" values="40;43;40" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="12" cy="35" r="0.7" fill="#8B85FF">
    <animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="cy" values="35;38;35" dur="2.8s" repeatCount="indefinite" begin="1s"/>
  </circle>
</svg>
