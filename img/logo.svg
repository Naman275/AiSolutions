<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B6FFF"/>
      <stop offset="100%" style="stop-color:#00E5FF"/>
    </linearGradient>
    <linearGradient id="ringGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF"/>
      <stop offset="50%" style="stop-color:#7B6FFF"/>
      <stop offset="100%" style="stop-color:#FF6BCD"/>
    </linearGradient>
    <linearGradient id="ringGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6BCD"/>
      <stop offset="50%" style="stop-color:#00E5FF"/>
      <stop offset="100%" style="stop-color:#7B6FFF"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9D8FFF"/>
      <stop offset="100%" style="stop-color:#00E5FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer rotating ring - BRIGHT -->
  <circle cx="25" cy="25" r="23" fill="none" stroke="url(#ringGrad1)" stroke-width="2"
          stroke-dasharray="10 3 3 3" opacity="0.85" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate"
                      from="0 25 25" to="360 25 25" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- Middle counter-rotating ring -->
  <circle cx="25" cy="25" r="19" fill="none" stroke="url(#ringGrad2)" stroke-width="1.5"
          stroke-dasharray="5 5" opacity="0.75" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate"
                      from="360 25 25" to="0 25 25" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbiting dots - BRIGHT with glow -->
  <circle cx="25" cy="3" r="2.2" fill="#00E5FF" filter="url(#glowStrong)">
    <animateTransform attributeName="transform" type="rotate"
                      from="0 25 25" to="360 25 25" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="47" cy="25" r="1.8" fill="#FF6BCD" filter="url(#glowStrong)">
    <animateTransform attributeName="transform" type="rotate"
                      from="120 25 25" to="480 25 25" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="25" cy="47" r="2" fill="#7B6FFF" filter="url(#glowStrong)">
    <animateTransform attributeName="transform" type="rotate"
                      from="240 25 25" to="600 25 25" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Inner glow background -->
  <circle cx="25" cy="25" r="14" fill="url(#logoGrad)" opacity="0.2">
    <animate attributeName="r" values="13;15;13" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.3;0.15" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Neural connections - BRIGHT white/cyan lines -->
  <g stroke="#00E5FF" stroke-width="1" fill="none" opacity="0.7" filter="url(#glow)">
    <!-- Center connections -->
    <line x1="25" y1="15" x2="25" y2="25" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="33" y1="20" x2="25" y2="25" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="1.8s" repeatCount="indefinite"/>
    </line>
    <line x1="33" y1="30" x2="25" y2="25" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="25" y1="35" x2="25" y2="25" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="1.6s" repeatCount="indefinite"/>
    </line>
    <line x1="17" y1="30" x2="25" y2="25" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="1.9s" repeatCount="indefinite"/>
    </line>
    <line x1="17" y1="20" x2="25" y2="25" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="1.7s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Outer hex connections - BRIGHT pink/purple -->
  <g stroke="#9D8FFF" stroke-width="0.8" fill="none" opacity="0.6" filter="url(#glow)">
    <line x1="25" y1="15" x2="33" y2="20" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="2.2s" repeatCount="indefinite"/>
    </line>
    <line x1="33" y1="20" x2="33" y2="30" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="2.4s" repeatCount="indefinite"/>
    </line>
    <line x1="33" y1="30" x2="25" y2="35" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="2.1s" repeatCount="indefinite"/>
    </line>
    <line x1="25" y1="35" x2="17" y2="30" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="2.3s" repeatCount="indefinite"/>
    </line>
    <line x1="17" y1="30" x2="17" y2="20" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="17" y1="20" x2="25" y2="15" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="2.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Center node - BRIGHT glowing -->
  <circle cx="25" cy="25" r="4" fill="url(#logoGrad)" filter="url(#glowStrong)">
    <animate attributeName="r" values="3.5;4.5;3.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- White core dot -->
  <circle cx="25" cy="25" r="1.5" fill="#ffffff" opacity="0.9">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Surrounding nodes - BRIGHT with white cores -->
  <circle cx="25" cy="15" r="2.5" fill="#7B6FFF" filter="url(#glow)"/>
  <circle cx="25" cy="15" r="1" fill="#fff" opacity="0.8"/>

  <circle cx="33" cy="20" r="2.5" fill="#9D8FFF" filter="url(#glow)"/>
  <circle cx="33" cy="20" r="1" fill="#fff" opacity="0.8"/>

  <circle cx="33" cy="30" r="2.5" fill="#00E5FF" filter="url(#glow)"/>
  <circle cx="33" cy="30" r="1" fill="#fff" opacity="0.8"/>

  <circle cx="25" cy="35" r="2.5" fill="#FF6BCD" filter="url(#glow)"/>
  <circle cx="25" cy="35" r="1" fill="#fff" opacity="0.8"/>

  <circle cx="17" cy="30" r="2.5" fill="#9D8FFF" filter="url(#glow)"/>
  <circle cx="17" cy="30" r="1" fill="#fff" opacity="0.8"/>

  <circle cx="17" cy="20" r="2.5" fill="#00E5FF" filter="url(#glow)"/>
  <circle cx="17" cy="20" r="1" fill="#fff" opacity="0.8"/>

  <!-- Spark particles - BRIGHT -->
  <circle cx="30" cy="9" r="1" fill="#00E5FF" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="9;6;9" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="41" cy="30" r="0.8" fill="#FF6BCD" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="cx" values="41;44;41" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="11" cy="34" r="0.9" fill="#7B6FFF" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="cy" values="34;37;34" dur="2.8s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="20" cy="8" r="0.7" fill="#FF6BCD" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite" begin="0.8s"/>
    <animate attributeName="cx" values="20;18;20" dur="2.2s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
</svg>
